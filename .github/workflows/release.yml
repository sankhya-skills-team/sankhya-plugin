name: release

# Cria uma GitHub Release sempre que `version` de plugin.json muda no master.
# Tag vX.Y.Z + changelog agrupado por tipo de Conventional Commit.

on:
  push:
    branches: [master]
    paths:
      - '.claude-plugin/plugin.json'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ler versão de plugin.json
        id: ver
        run: |
          VERSION=$(jq -r '.version' .claude-plugin/plugin.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Abortar se a tag já existe
        id: check
        run: |
          if git rev-parse "${{ steps.ver.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.ver.outputs.tag }} já existe — nada a fazer."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Montar release notes
        if: steps.check.outputs.exists == 'false'
        id: log
        env:
          TAG: ${{ steps.ver.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          PREV=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          [ -z "$PREV" ] && RANGE="" || RANGE="$PREV..HEAD"

          # normaliza prefixos-lixo (@ , gitmoji :word:, emoji) antes do match
          NORM='s/^@ +//; s/^:[a-z_]+: *//; s/^[^A-Za-z]+//'
          norm() { sed -E "$NORM"; }

          # título = resumo do commit que bumpou a version (sem prefixo de tipo)
          SUMMARY=$(git log -1 --pretty='%s' -- .claude-plugin/plugin.json | norm \
            | sed -E 's/^(feat|fix|docs|refactor|perf|chore|ci|style|test)(\(.+\))?!?: //')
          echo "title=$TAG — $SUMMARY" >> "$GITHUB_OUTPUT"

          # nota manual opcional: .github/release-notes/vX.Y.Z.md tem prioridade total
          MANUAL=".github/release-notes/$TAG.md"

          emit() { # $1=prefixo regex  $2=título
            local body
            body=$(git log $RANGE --no-merges --pretty='%s' | norm \
              | grep -iE "^$1(\(.+\))?!?: " \
              | sed -E "s/^$1(\(.+\))?!?: //" | sed 's/^/- /')
            [ -n "$body" ] && printf '### %s\n%s\n\n' "$2" "$body"
          }

          {
            printf '## %s\n\n' "$SUMMARY"
            if [ -f "$MANUAL" ]; then
              cat "$MANUAL"; printf '\n\n'
            else
              CHANGES=$( {
                emit 'feat'     '✨ Funcionalidades'
                emit 'fix'      '🐛 Correções'
                emit 'docs'     '📚 Documentação'
                emit 'refactor' '♻️ Refatoração'
                emit 'perf'     '⚡ Performance'
                emit 'chore'    '🔧 Manutenção'
                emit 'ci'       '👷 CI'
              } )
              # fallback: nenhum commit convencional no range
              [ -n "$CHANGES" ] || CHANGES=$(git log $RANGE --no-merges --pretty='%s' | norm | sed 's/^/- /')
              printf '%s\n' "$CHANGES"
            fi

            printf -- '---\n\n'
            printf '### 📦 Instalar / atualizar\n'
            printf 'No Claude Code:\n\n'
            printf '```\n/plugin update sankhya@sankhya\n```\n\n'
            printf 'Primeira instalação: `/plugin marketplace add %s` → `/plugin install sankhya`.\n\n' "$REPO"

            if [ -n "$PREV" ]; then
              printf '**Changelog completo:** [%s...%s](https://github.com/%s/compare/%s...%s)\n' \
                "$PREV" "$TAG" "$REPO" "$PREV" "$TAG"
            fi
          } > NOTES.md

      - name: Criar tag e release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag "${{ steps.ver.outputs.tag }}"
          git push origin "${{ steps.ver.outputs.tag }}"
          gh release create "${{ steps.ver.outputs.tag }}" \
            --title "${{ steps.log.outputs.title }}" \
            --notes-file NOTES.md
